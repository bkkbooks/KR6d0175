body:
  text: 科金剛錍序宋雲間沙門淨岳撰科分大經章段起自關內憑小山瑤前代未聞也吾祖章安作疏益詳至荊溪將迦葉品分正緣了別指方隅則權實進否曉然而明可謂善乎派深良哉析重也余復以佛性周遍三千具攝而分今文分而又分賓主問答引文釋義略無混亂雖短脛亦可以厲法流孺子敢當荷負矣或曰猶牧女之添水將非澆漓於乳味乎不然乳益乳也苟能鑽搖醍醐可獲豈仍乳而已耶
